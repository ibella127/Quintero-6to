<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    header {
      background: #534AB7;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      border-radius: 8px;
    }

    nav {
      background: white;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    nav .menu-items {
      display: flex;
      gap: 8px;
    }

    nav button {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    section {
      background: white;
      padding: 16px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
    }

    .card p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .btn-accion {
      padding: 14px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    footer {
      background: white;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      color: #888;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>Mi App</header>

    <nav>
      <span>Menú</span>
      <div class="menu-items">
        <button>Inicio</button>
        <button>Perfil</button>
        <button>Config</button>
      </div>
    </nav>

    <section>
      <strong>Contenido principal</strong>
      <div class="card">
        <strong>Tarjeta 1</strong>
        <p>Descripción corta del item.</p>
      </div>
      <div class="card">
        <strong>Tarjeta 2</strong>
        <p>Descripción corta del item.</p>
      </div>
      <div class="card">
        <strong>Tarjeta 3</strong>
        <p>Descripción corta del item.</p>
      </div>
    </section>

    <button class="btn-accion">Acción Principal</button>

    <footer>Footer — Mi App v1.0</footer>

  </div>
</body>
</html>
