<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONO | Web Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="logo-top">
                <img src="logo-lateral.png" alt="Logo" class="side-img">
            </div> 
            
            <h2 class="menu-title">MENÚ</h2>
            
            <nav class="nav-icons">
                <a href="alumno.html" target="_blank" class="nav-item">
                    <img src="icono-alumno.png" alt="Alumno">
                </a>
                <a href="preceptoria.html" target="_blank" class="nav-item">
                    <img src="icono-prece.png" alt="Preceptoría">
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="hero-container">
                
                <div class="main-title-img">
                    <img src="titulo-krono-imagen.png" alt="KRONO" class="krono-header">
                </div>
                
                <div class="flip-card">
                    <div class="flip-card-inner">
                        
                        <div class="flip-card-front">
                            <p>Es una APP que te ayudará a llevar un conteo de tus faltas para mejorar tu rendimiento y ayudar al prece con su trabajo ... y te brinda premios en cantina!!</p>
                        </div>

                        <div class="flip-card-back">
                            <img src="imagen-escuela.png" alt="Mi Escuela" class="school-img">
                        </div>

                    </div>
                </div>

                <p class="footer-msg">Entra a tu icono a la izquierda para más información</p>
            </div>
        </main>
    </div>

</body>
</html>
